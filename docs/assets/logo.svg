<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#121212" />
  
  <!-- Centered Group -->
  <g transform="translate(15, 15)">
    <!-- Microchip Body -->
    <rect x="20" y="20" width="50" height="50" rx="8" fill="none" stroke="#00bcd4" stroke-width="6" />
    
    <!-- Microchip Pins -->
    <!-- Top -->
    <line x1="30" y1="8" x2="30" y2="20" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="45" y1="8" x2="45" y2="20" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="60" y1="8" x2="60" y2="20" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    
    <!-- Bottom -->
    <line x1="30" y1="70" x2="30" y2="82" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="45" y1="70" x2="45" y2="82" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="60" y1="70" x2="60" y2="82" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    
    <!-- Left -->
    <line x1="8" y1="30" x2="20" y2="30" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="8" y1="45" x2="20" y2="45" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="8" y1="60" x2="20" y2="60" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    
    <!-- Right -->
    <line x1="70" y1="30" x2="82" y2="30" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="70" y1="45" x2="82" y2="45" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    <line x1="70" y1="60" x2="82" y2="60" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" />
    
    <!-- Inner Flash (Lightning Bolt) -->
    <path d="M 52 30 L 35 48 L 47 48 L 38 62 L 56 42 L 44 42 Z" fill="#00bcd4" />
  </g>
</svg>
